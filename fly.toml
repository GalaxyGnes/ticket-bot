app = "ticket-bot-zi0rga"
primary_region = "arn"

[build]

[env]
  CHECK_INTERVAL = "30"

[http_service]
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "bot_data"
  destination = "/data"
