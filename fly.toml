# fly.toml app configuration file generated for ticket-bot-zi0rga on 2026-06-10T09:13:07Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ticket-bot-zi0rga'
primary_region = 'arn'

[build]

[env]
  CHECK_INTERVAL = '30'

[[mounts]]
  source = 'bot_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
